<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow-tg" cx="22%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#f98b00" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f98b00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="80%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#229ed9" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#229ed9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#060607"/>
  <rect width="1200" height="630" fill="url(#glow-tg)"/>
  <rect width="1200" height="630" fill="url(#glow-blue)"/>

  <!-- Декоративные кольца -->
  <circle cx="1090" cy="520" r="220" fill="none" stroke="#229ed9" stroke-opacity="0.07" stroke-width="1.5"/>
  <circle cx="1090" cy="520" r="155" fill="none" stroke="#229ed9" stroke-opacity="0.1" stroke-width="1.5"/>
  <circle cx="1090" cy="520" r="88" fill="none" stroke="#f98b00" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- Декоративный телефон / чат справа -->
  <rect x="710" y="60" width="240" height="420" rx="28" fill="#0e0e10" stroke="#229ed9" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Камера телефона -->
  <rect x="790" y="76" width="80" height="12" rx="6" fill="#1a1a1f"/>
  <!-- Шапка Telegram чата -->
  <rect x="710" y="88" width="240" height="52" fill="#1a1a1f"/>
  <circle cx="738" cy="114" r="16" fill="#229ed9" fill-opacity="0.3"/>
