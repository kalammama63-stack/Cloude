  <text x="60" y="220" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="900" fill="white" letter-spacing="-3">Telegram-боты</text>
  <text x="60" y="316" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="900" fill="white" letter-spacing="-3">для <tspan fill="#f98b00">бизнеса</tspan></text>

  <!-- Оранжевая линия -->
  <rect x="60" y="348" width="90" height="5" rx="2.5" fill="#f98b00"/>

