  <rect x="722" y="154" width="178" height="42" rx="12" fill="#1e1e24"/>
  <text x="738" y="174" font-family="Inter, Arial, sans-serif" font-size="12" fill="#c4c4c7">Привет! Хочу узнать</text>
  <text x="738" y="188" font-family="Inter, Arial, sans-serif" font-size="12" fill="#c4c4c7">про сайт 👋</text>

  <!-- Исходящее 1 (бот) -->
  <rect x="724" y="208" width="214" height="56" rx="12" fill="#f98b00" fill-opacity="0.15" stroke="#f98b00" stroke-opacity="0.3" stroke-width="1"/>
