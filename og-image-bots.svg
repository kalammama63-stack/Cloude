  <text x="738" y="244" font-family="Inter, Arial, sans-serif" font-size="11" fill="#c4c4c7">Привет! Выберите услугу:</text>
  <text x="738" y="258" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8a8a90">только что</text>

  <!-- Кнопки бота -->
  <rect x="724" y="276" width="214" height="30" rx="8" fill="#229ed9" fill-opacity="0.2" stroke="#229ed9" stroke-opacity="0.4" stroke-width="1"/>
  <text x="831" y="296" font-family="Inter, Arial, sans-serif" font-size="12" fill="#229ed9" text-anchor="middle">Сайт на Tilda</text>

  <rect x="724" y="314" width="214" height="30" rx="8" fill="#229ed9" fill-opacity="0.2" stroke="#229ed9" stroke-opacity="0.4" stroke-width="1"/>
  <text x="831" y="334" font-family="Inter, Arial, sans-serif" font-size="12" fill="#229ed9" text-anchor="middle">ИИ-сайт</text>

  <rect x="724" y="352" width="214" height="30" rx="8" fill="#229ed9" fill-opacity="0.2" stroke="#229ed9" stroke-opacity="0.4" stroke-width="1"/>
  <text x="831" y="372" font-family="Inter, Arial, sans-serif" font-size="12" fill="#229ed9" text-anchor="middle">Telegram-бот</text>

