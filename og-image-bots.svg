  <circle cx="662" cy="52" r="3.5" fill="#f98b00" fill-opacity="0.5"/>
  <circle cx="646" cy="70" r="2" fill="#f98b00" fill-opacity="0.3"/>
  <circle cx="680" cy="40" r="2.5" fill="#229ed9" fill-opacity="0.4"/>

