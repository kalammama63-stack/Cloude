  <rect x="960" y="100" width="200" height="360" rx="24" fill="#0c0c0e" stroke="#f98b00" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="960" y="130" width="200" height="44" fill="#161618"/>
  <circle cx="984" cy="152" r="13" fill="#f98b00" fill-opacity="0.2"/>
  <text x="984" y="157" font-family="Inter, Arial, sans-serif" font-size="11" fill="#f98b00" text-anchor="middle">24/7</text>
  <rect x="1006" y="143" width="90" height="10" rx="3" fill="#1e1e24"/>
  <rect x="1006" y="160" width="64" height="8" rx="3" fill="#1e1e24"/>

