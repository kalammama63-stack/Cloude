  <rect x="748" y="394" width="190" height="36" rx="12" fill="#229ed9" fill-opacity="0.25"/>
  <text x="756" y="410" font-family="Inter, Arial, sans-serif" font-size="12" fill="#c4c4c7">Мне нужен сайт + бот</text>
  <text x="756" y="424" font-family="Inter, Arial, sans-serif" font-size="12" fill="#c4c4c7">для автосервиса</text>

  <!-- Индикатор набора -->
  <rect x="722" y="442" width="74" height="28" rx="14" fill="#1e1e24"/>
  <circle cx="742" cy="456" r="4" fill="#5a5a62"/>
  <circle cx="756" cy="456" r="4" fill="#5a5a62"/>
  <circle cx="770" cy="456" r="4" fill="#5a5a62"/>

