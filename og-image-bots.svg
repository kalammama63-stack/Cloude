  <!-- Теги -->
  <rect x="60" y="448" width="188" height="38" rx="19" fill="#1e1e24"/>
  <text x="154" y="473" font-family="Inter, Arial, sans-serif" font-size="15" fill="#c4c4c7" text-anchor="middle">Приём заявок</text>

  <rect x="260" y="448" width="188" height="38" rx="19" fill="#1e1e24"/>
  <text x="354" y="473" font-family="Inter, Arial, sans-serif" font-size="15" fill="#c4c4c7" text-anchor="middle">Онлайн-запись</text>

  <rect x="460" y="448" width="188" height="38" rx="19" fill="#1e1e24"/>
  <text x="554" y="473" font-family="Inter, Arial, sans-serif" font-size="15" fill="#c4c4c7" text-anchor="middle">от 15 000 ₽</text>

  <!-- Нижняя линия и домен -->
  <rect x="60" y="552" width="1080" height="1" fill="#1e1e24"/>
  <text x="60" y="585" font-family="Inter, Arial, sans-serif" font-size="18" fill="#3a3a42">tk-webb.ru</text>
  <text x="1140" y="585" font-family="Inter, Arial, sans-serif" font-size="18" fill="#3a3a42" text-anchor="end">Тамара Коломейцева</text>
</svg>
